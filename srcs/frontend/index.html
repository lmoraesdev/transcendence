<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- META -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="/web/images/pong" type="image/x-icon" />

    <!-- Bootstrap -->
    <link rel="stylesheet" href="/web/bootstrap-5.2.3-dist/css/bootstrap.min.css" />
    
    <!-- CSS -->
    <link rel="stylesheet" href="/web/css/style.css" />
    <link rel="stylesheet" href="/web/css/components/bvambient.css" />
    <link rel="stylesheet" href="./web/css/components/Navbar.css" />
    <link rel="stylesheet" href="./web/js/components/Profile/ProfileData.css" />
    
    <!-- Vanilla JS -->
    <script defer src="/web/bootstrap-5.2.3-dist/js/bootstrap.min.js"></script>
    <script defer src="/app.js" type="module"></script>
    
    <title>ft_transcendence</title>
  </head>
  <body>
    <nav class='navbar'>
      <div>
        <img src="./web/images/logo_pong.png" alt="logo pong"/>
      </div>
      <div class='navbar-items'>
        <input type='radio' name='navbar' value='home' id='home'><label for='home' class='navbar-button'>Home</label></input>
        <input type='radio' name='navbar' value='statistics' id='statistics'><label for='statistics' class='navbar-button'>Statistcs</label></input>
        <input type='radio' name='navbar' value='leaderboard' id='leaderboard'><label for='leaderboard' class='navbar-button'>Leaderboard</label></input>
        <input type='radio' name='navbar' value='tournament' id='tournament'><label for='tournament' class='navbar-button'>Tournament</label></input>
        <input type='radio' name='navbar' value='guilds' id='guilds'><label for='guilds' class='navbar-button'>Guilds</label></input>
      </div>
    </nav>
    <div class="profile">
      <div class="profile-data">
        <div>
            <h2 class="profile-title">Nome</h2>
            <img class="profile-img" src='./web/images/profile.png' alt='Foto perfil'width='150px' height='150px'/>
        </div>
        <div class="profile-statistcs">
          <div>
            <p class="profile-number">0</p>
            <p class="profile-text">General Rank</p>
          </div>
          <div>
            <p class="profile-number">0</p>
            <p class="profile-text">Ladder Victories</p>
          </div>
          <div>
          <p class="profile-number">0</p>
          <p class="profile-text">Score</p>
        </div>
        <div>
          <p class="profile-number">0</p>
          <p class="profile-text">Total Ladder Games</p>
        </div>
      </div>
    </div>
    <div class="profile-infos">
          <input type="radio" name="option" value="guild" id="guild" checked>
            <label for="guild" class="profile-option">Guilds</label>
          </input>
          <input type="radio" name="option" value="achievements"  id="achievements">
            <label for="achievements" class="profile-option">Achievements</label>
          </input>
          <input type="radio" name="option" value="friends"  id="friends">
            <label for="friends" class="profile-option">Friends</label>
          </input>
    </div>
    </div>
    <div id="root"></div>
    <script defer src="/web/js/components/bvambient.js" type="module"></script>
  </body>
</html>
