<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <!-- META -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="web/images/" type="image/x-icon" />

    <!-- Bootstrap -->
    <link rel="stylesheet" href="web/bootstrap-5.3.2-dist/css/bootstrap.min.css" />
    <script defer src="web/bootstrap-5.3.2-dist/js/bootstrap.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="web/css/style.css" />

    <!-- Vanilla JS -->
    <script defer src="/app.js" type="module"></script>

    <title>ft_transcendence</title>
  </head>
  <body>
    <div id="root"></div>

    <!--------------------------- PAGES --------------------------->

    <!-- HOME PAGE -->
    <template id="home-template">
      <my-navbar></my-navbar>
      <main class="container-fluid d-flex flex-column justify-content-center gap-5 my-5">
        <section class="d-flex flex-wrap justify-content-center align-items-center gap-5 w-100">
          <play-card game="PG" wallpaper="/images/pong_glass.svg"></play-card>
          <play-card game="TTT" wallpaper="/images/tictactoe_glass.svg"></play-card>
        </section>
      </main>
      <my-footer></my-footer>
    </template>

    <!-- LOGIN PAGE -->
    <template id="login-template">
      <div></div>
      <div class="d-flex flex-wrap justify-content-center align-items-center gap-5 pt-5">
        <div class="d-flex flex-column justify-content-center align-items-center gap-3">
          <img class="w-75" src="/images/pong.svg" alt="logo" referrerpolicy="no-referrer" />
          <h1 class="display-1 text-center fw-bold m-0">PING PONG</h1>
        </div>
      </div>
      <div class="d-flex flex-column justify-content-center align-items-center gap-3">
        <login-button
          color="success"
          link="https://localhost/authentication/intra/"
          text="Intra 42"
        ></login-button>
        <login-button
          color="primary"
          link="https://localhost/authentication/google/"
          text="Google"
        ></login-button>
      </div>
      <my-footer></my-footer>
    </template>

    <!-- NOTFOUND PAGE -->
    <template id="notfound-template">
      <div></div>
      <div class="d-flex flex-column justify-content-center align-items-center w-100 h-100">
        <h1 class="fw-bold text-center text-black-50">
          Oops, <span class="fw-bold display-1">404</span>
        </h1>
        <h2 class="fw-bold text-center text-black-50">ROUTE NOT FOUND !</h2>
      </div>
      <my-footer></my-footer>
    </template>

    <!--------------------------- COMPONENTS --------------------------->

    <!-- STARS -->
    <template id="stars-overlay">
      <div id="stars1"></div>
      <div id="stars2"></div>
      <div id="stars3"></div>
      <div id="stars4"></div>
    </template>

    <!-- LOGIN BUTTON -->
    <template id="login-button">
      <a class="btn btn-lg border border-5 rounded-5 fw-bold fs-1 text-light"></a>
    </template>

    <!-- NAVBAR -->
    <template id="my-navbar">
      <a class="logo link btn rounded-5 fs-3 px-4 py-0" href="/home/">FT_TRANSCENDENCE</a>
      <div class="hamburger btn rounded-2 px-2 py-1">
        <div class="line rounded-1"></div>
        <div class="line rounded-1"></div>
        <div class="line rounded-1"></div>
      </div>
      <nav class="nav-bar d-flex justify-content-center align-items-center">
        <ul class="d-flex justify-content-center align-items-center p-0 m-0 gap-1">
          <li>
            <button class="colorizer btn d-block rounded-5 fs-5 px-4 py-0" href="/tournaments/">
              c
            </button>
          </li>
          <li>
            <a class="link btn rounded-5 fs-5 px-4 py-0" href="/tournaments/">Tournament</a>
          </li>
          <li>
            <a class="link btn rounded-5 fs-5 px-4 py-0" href="/profile/">Profile</a>
          </li>
          <li>
            <a class="link btn rounded-5 fs-5 px-4 py-0" href="/setting/">Setting</a>
          </li>
          <li>
            <a
              class="logout btn rounded-5 fs-5 px-4 py-0"
              href="https://localhost/authentication/logout/"
              >Logout</a
            >
          </li>
        </ul>
      </nav>
    </template>

    <!-- FOOTER -->
    <template id="my-footer">
      <footer class="d-flex flex-wrap p-5">
        <h5>&copy 2024</h5>
        <ul class="d-flex flex-wrap ps-4 m-0 gap-4">
          <li class="fs-6">
            erick <a href="https://github.com/Erick-Kaik" target="_blank">Erick Kaik</a>
          </li>
          <li class="fs-6">
            zakaria wina
            <a href="https://github.com/luciana-pereira" target="_blank">Luciana Pereira</a>
          </li>
          <li class="fs-6">
            taha naceur <a href="https://github.com/MelTami" target="_blank">Melissa Vavassori</a>
          </li>
          <li class="fs-6">
            mustapha idfath
            <a href="https://github.com/lmoraesdev" target="_blank">Leandro Moraes</a>
          </li>
        </ul>
      </footer>
    </template>
  </body>
</html>
