server {
    listen 443 ssl;
    listen [::]:443 ssl;

    #server_name localhost;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_certificate /etc/ssl/certs/nginx.crt;
    ssl_certificate_key /etc/ssl/private/nginx.key;

    root /var/www/transcendence/;
    index index.html;

    rewrite ^([^.]*[^/])$ $1/ permanent;

    location /favicon.ico { 
        access_log off; 
        log_not_found off; 
    }

    # Configura a localização padrão
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /web/css/ {
        alias /var/www/transcendence/web/css/;
        try_files $uri $uri/ =404;
    }

    location /web/js/ {
        alias /var/www/transcendence/web/js/;
        try_files $uri $uri/ =404;
    }

    # Configuração de alias para diretórios estáticos
    location /web/ {
        alias /var/www/transcendence/web/;
        #try_files $uri $uri/ =404;
    }

    location /web/images/ {
        alias /var/www/transcendence/web/images/;
        try_files $uri $uri/ =404;
    }

    # Configuração para WebSocket
    location /authentication/ws/login/ {
        proxy_pass http://authentication:8000/authentication/ws/login/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        #proxy_set_header Host $host;
        #proxy_cache_bypass $http_upgrade;
        #proxy_set_header X-Real-IP $remote_addr;
        #proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Configuração de proxy para APIs
    location /authentication/ {
        proxy_pass http://authentication:8000/authentication/;
    }

    location /player/ {
        proxy_pass http://player:8000/player/;
    }

    # Configurações adicionais para arquivos estáticos
    location /login/web/ {
        #try_files $uri =404;
        add_header Cache-Control "public";
    }

    location /static/ {
        proxy_pass http://player:8000/player/static/;
        try_files $uri $uri/ =404;
    }

    location /media/ {
        proxy_pass http://player:8000/player/media/;
        try_files $uri $uri/ =404;
    }

    # Configuração para servir arquivos estáticos com os tipos MIME corretos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        root /var/www/transcendence;
        expires 30d;
        add_header Cache-Control "public";
    }
}

