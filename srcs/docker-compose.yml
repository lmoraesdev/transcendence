version: '3.3'

services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
    ports:
      - '3000:3000'
    networks:
      - app_network
    depends_on:
      - backend

  backend:
    container_name: backend
    build:
      context: ./backend
    ports:
      - '8000:8000'
    volumes:
      - /srcs/backend/djangoapp:/app/djangoapp
      - /srcs/backend/data/web/static:/data/web/static
      - /srcs/backend/data/web/media:/data/web/media
    env_file:
      - ./backend/dotenv_files/.env
    networks:
      - app_network
    depends_on:
      - db 

  server:
    container_name: server
    build: 
      context: ./server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ssl_certificates:/etc/ssl
      - /srcs/frontend/static:/app/static
      - /srcs/frontend/media:/app/media
    depends_on:
      - backend
    restart: on-failure

  db:
      image: postgres:13
      container_name: postgres
      restart: always
      env_file:
        - ./backend/dotenv_files/.env
      volumes:
        - /srcs/data/postgres/data:/var/lib/postgresql/data
      networks:
        - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  ssl_certificates:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/srcs/server/ssl
