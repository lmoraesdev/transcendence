version: '3.3'

services:
  server:
    container_name: server
    build:
      context: ./frontend/server
    networks:
      - app_network
    volumes:
      - ./frontend/server:/var/www/transcendence/:ro
      - ./frontend/server/conf/:/etc/nginx/services/:ro
    ports:
      - 443:443
    restart: on-failure

  authentication:
    container_name: authentication
    build:
      context: ./backend/services/authentication/
    image: authentication
    env_file:
      - ./backend/dotenv_files/.env
    volumes:
      - ./backend/services/authentication:/services/authentication/:rw
    networks:
      - app_network
    ports:
      - 8000:8000
    depends_on:
      - db
    restart: on-failure

  pong:
    build:
      context: ./backend/services/pong/
      dockerfile: dockerfile
    image: pong
    container_name: pong
    env_file:
      - ./backend/dotenv_files/.env
    volumes:
      - ./backend/services/pong:/services/pong/:rw
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:16.2
    container_name: postgres-db
    restart: unless-stopped
    env_file:
      - ./backend/dotenv_files/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    env_file:
      - ./backend/dotenv_files/.env
    ports:
      - '8080:80'
    networks:
      - app_network
    restart: unless-stopped
    depends_on:
      - db

networks:
  app_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
