version: '3.3'

services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
    ports:
      - '3000:3000'
    networks:
      - app_network
    depends_on:
      - backend

  backend:
    container_name: backend
    build:
      context: ./backend
    ports:
      - '8000:8000'
    volumes:
      - /srcs/backend/djangoapp:/app/djangoapp
      - /srcs/backend/data/web/static:/data/web/static
      - /srcs/backend/data/web/media:/data/web/media
    env_file:
      - ./backend/dotenv_files/.env
    networks:
      - app_network
    depends_on:
      - db 

  db:
      image: postgres:13
      container_name: postgres
      restart: always
      env_file:
        - ./backend/dotenv_files/.env
      volumes:
        - /srcs/data/postgres/data:/var/lib/postgresql/data
      networks:
        - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres-data:
